name: Build Windows Executable

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup MSVC
      uses: microsoft/setup-msbuild@v1.3
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Setup Qt
      uses: jurplel/install-qt-action@v3.3.0
      with:
        version: '6.5.3'
        target: 'desktop'
        arch: 'win64_msvc2019_64'
        cache: false
    
    - name: Setup CMake
      uses: jwlawson/actions-setup-cmake@v2.0
      with:
        cmake-version: '3.26.x'
    
    - name: Configure CMake
      run: |
        $env:Qt6_DIR = "C:\Qt\6.5.3\msvc2019_64\lib\cmake\Qt6"
        cmake -B build -G "Visual Studio 17 2022" -A x64 -DCMAKE_PREFIX_PATH="$env:Qt6_DIR" -DCMAKE_BUILD_TYPE=Release
    
    - name: Build
      run: |
        cmake --build build --config Release --parallel
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: CppGuiApp-Windows
        path: build/Release/CppGuiApp.exe