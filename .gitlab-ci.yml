stages:
  - build
  - package

variables:
  QT_VERSION: "6.6.1"
  BUILD_TYPE: "Release"

build_windows:
  stage: build
  tags:
    - shell
  script:
    - echo "Checking for Qt..."
    - if (Test-Path "C:\Qt\$env:QT_VERSION\msvc2022_64\bin") { echo "Qt found at C:\Qt\$env:QT_VERSION\msvc2022_64" } else { echo "Qt not found, downloading..." }
    
    - if (-not (Test-Path "C:\Qt\$env:QT_VERSION\msvc2022_64\bin")) { powershell -Command "Invoke-WebRequest -Uri 'https://download.qt.io/online/qtsdkrepository/windows_x86/desktop/qt6_661/qt.qt6.661.win64_msvc2022_64/6.6.1-0-202311151048qtbase-Windows-Windows_10-MSVC2022-Windows-Windows_10-X86_64.7z' -OutFile 'qt.7z'" }
    - if (-not (Test-Path "C:\Qt\$env:QT_VERSION\msvc2022_64\bin")) { powershell -Command "Expand-Archive -Path 'qt.7z' -DestinationPath 'C:\Qt' -Force" }
    
    - echo "Checking for CMake..."
    - if (Test-Path "C:\Program Files\CMake\bin\cmake.exe") { echo "CMake found" } else { echo "CMake not found, installing..." }
    - if (-not (Test-Path "C:\Program Files\CMake\bin\cmake.exe")) { powershell -Command "Set-ExecutionPolicy Bypass -Scope Process -Force; [System.Net.ServicePointManager]::SecurityProtocol = [System.Net.ServicePointManager]::SecurityProtocol -bor 3072; iex ((New-Object System.Net.WebClient).DownloadString('https://community.chocolatey.org/install.ps1'))" }
    - if (-not (Test-Path "C:\Program Files\CMake\bin\cmake.exe")) { choco install cmake -y }
    
    - echo "Configuring project..."
    - $env:QT_DIR = "C:\Qt\$env:QT_VERSION\msvc2022_64"
    - cmake -B build -G "Visual Studio 17 2022" -A x64 -DCMAKE_PREFIX_PATH="$env:QT_DIR" -DCMAKE_BUILD_TYPE="$env:BUILD_TYPE"
    
    - echo "Building project..."
    - cmake --build build --config $env:BUILD_TYPE --parallel
    
  artifacts:
    paths:
      - build/Release/CppGuiApp.exe
    expire_in: 1 week
  only:
    - main
    - master
    - tags

package_windows:
  stage: package
  tags:
    - shell
  dependencies:
    - build_windows
  script:
    - echo "Packaging application..."
    - mkdir release
    - copy build\Release\CppGuiApp.exe release\
    
    - echo "Copying Qt dependencies..."
    - $env:QT_DIR = "C:\Qt\$env:QT_VERSION\msvc2022_64"
    - $env:PATH = "$env:QT_DIR\bin;$env:PATH"
    - windeployqt --release --no-translations release\CppGuiApp.exe
    
    - echo "Creating archive..."
    - powershell -Command "Compress-Archive -Path 'release\*' -DestinationPath 'CppGuiApp-Windows.zip'"
    
  artifacts:
    paths:
      - CppGuiApp-Windows.zip
    expire_in: 1 month
  only:
    - main
    - master
    - tags
  when: on_success

build_linux:
  stage: build
  image: gcc:11
  before_script:
    - apt-get update -qq
    - apt-get install -y -qq cmake qt6-base-dev qt6-tools-dev build-essential
  script:
    - echo "Configuring project..."
    - cmake -B build -DCMAKE_BUILD_TYPE=Release
    
    - echo "Building project..."
    - cmake --build build --config Release --parallel
    
  artifacts:
    paths:
      - build/CppGuiApp
    expire_in: 1 week
  only:
    - main
    - master
    - tags
  allow_failure: true